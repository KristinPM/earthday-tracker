<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Our Virtual Tree</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:Aptos,"Segoe UI",sans-serif}
.wrap{display:flex;flex-direction:column;width:100%;height:100%;padding:14px 14px 12px}
.hdr{text-align:center;margin-bottom:10px;flex-shrink:0}
.hdr h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:700;color:#1a1a1a}
.hdr p{font-size:clamp(.9rem,1.5vw,1.2rem);color:#7a7a7a;margin-top:6px}
.cv{position:relative;flex:1;min-height:0;border-radius:12px;overflow:hidden;background:#f4f4f2}

.tree-layer{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center;
}
.tree-bw{
  filter:grayscale(1) brightness(0.88) contrast(1.05);
  z-index:1;
}
.tree-colour{
  z-index:2;
  clip-path:inset(100% 0 0 0);
  transition:clip-path 1.4s cubic-bezier(0.4,0,0.2,1);
}

/* Subtle brightness pulse — like sunlight filtering through */
@keyframes tree-breathe{
  0%,100%{ filter: brightness(1) saturate(1);   }
  50%    { filter: brightness(1.06) saturate(1.08); }
}

/* Applied to both tree layers together via a wrapper */
.tree-alive-wrap{
  position:absolute;inset:0;
  transform-origin: center bottom;
  transition: none;
}
.tree-alive-wrap.alive{
  animation:
    tree-breathe 4s  ease-in-out infinite;
}

/* ── Creature overlay layer ── */
.creature-layer{
  position:absolute;inset:0;
  z-index:3;
  pointer-events:none;
  opacity:0;
  transition:opacity 2s ease;
}
.creature-layer.alive{ opacity:1; }

.animal{ position:absolute; }
.animal img{ display:block; }

/* Butterfly subtle drift */
@keyframes butterfly-drift{
  0%  {transform:translate(0px, 0px)}
  20% {transform:translate(4%, -3%)}
  40% {transform:translate(7%,  2%)}
  60% {transform:translate(3%, -5%)}
  80% {transform:translate(1%,  1%)}
  100%{transform:translate(0px, 0px)}
}

/* Second butterfly drift — offset phase so they move independently */
@keyframes butterfly-drift-2{
  0%  {transform:translate(0px, 0px)}
  25% {transform:translate(-5%, 3%)}
  50% {transform:translate(-2%, -4%)}
  75% {transform:translate(3%,  2%)}
  100%{transform:translate(0px, 0px)}
}

/* ── Animal positions & sizes ── */

/* Butterfly 1 — gentle drift in canopy */
.butterfly{ left:55%; bottom:44%; animation:butterfly-drift 10s ease-in-out infinite; }
.butterfly img{ width:160px; }

/* Butterfly 2 — upper-left canopy area, offset animation */
.butterfly2{ left:22%; bottom:52%; animation:butterfly-drift-2 13s ease-in-out infinite; }
.butterfly2 img{ width:130px; }

/* Two deer side by side — bottom right */
.deer1{ right:10%; bottom:0; }
.deer1 img{ width:120px; }

.deer2{ right:22%; bottom:0; }
.deer2 img{ width:100px; }

/* Squirrel — bottom left, stationary */
.squirrel{ left:18%; bottom:0; }
.squirrel img{ width:75px; }

/* Fox — runs across the bottom, flips and returns */
@keyframes fox-run{
  0%   { transform: translate(-160px, 0) scaleX(-1); opacity:0; }
  5%   { opacity:1; }
  45%  { transform: translate(85vw, 0) scaleX(-1); opacity:1; }
  50%  { transform: translate(90vw, 0) scaleX(-1); opacity:0; }
  51%  { transform: translate(90vw, 0) scaleX(1); opacity:0; }
  56%  { opacity:1; }
  95%  { transform: translate(-130px, 0) scaleX(1); opacity:1; }
  99%  { transform: translate(-160px, 0) scaleX(1); opacity:0; }
  100% { transform: translate(-160px, 0) scaleX(-1); opacity:0; }
}
.fox{ left:0; bottom:2px; animation: fox-run 18s ease-in-out infinite; }
.fox img{ width:110px; }

/* ── "Tree is alive!" badge — centered, large, animated ── */
@keyframes badge-glow{
  0%,100%{ box-shadow: 0 0 12px 3px rgba(99,153,34,0.5), 0 0 30px 8px rgba(99,153,34,0.25); }
  50%    { box-shadow: 0 0 24px 8px rgba(99,153,34,0.85), 0 0 60px 20px rgba(99,153,34,0.4); }
}
@keyframes badge-breathe{
  0%,100%{ transform: translateX(-50%) scale(1); }
  50%    { transform: translateX(-50%) scale(1.05); }
}
@keyframes badge-shimmer{
  0%  { background-position: -200% center; }
  100%{ background-position: 200% center; }
}
@keyframes badge-enter{
  0%  { opacity:0; transform:translateX(-50%) scale(0.5); }
  70% { transform:translateX(-50%) scale(1.08); }
  100%{ opacity:1; transform:translateX(-50%) scale(1); }
}

.alive-badge{
  position:absolute;
  top:16px;
  left:50%;
  transform:translateX(-50%) scale(0.5);
  z-index:6;
  pointer-events:none;
  opacity:0;
}
.alive-badge.show{
  animation:
    badge-enter   0.8s cubic-bezier(0.34,1.3,0.64,1) forwards,
    badge-glow    2.5s ease-in-out 0.8s infinite,
    badge-breathe 3s   ease-in-out 0.8s infinite;
}
.alive-badge-inner{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 28px;
  border-radius:999px;
  background: linear-gradient(135deg, #27500A 0%, #3d7a14 40%, #639922 70%, #3d7a14 100%);
  background-size: 200% auto;
  color:white;
  font-size:clamp(1rem,2.5vw,1.3rem);
  font-weight:700;
  letter-spacing:.5px;
  white-space:nowrap;
  position:relative;
  overflow:hidden;
}
.alive-badge-inner::after{
  content:'';
  position:absolute;
  inset:0;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
  background-size:200% 100%;
  animation: badge-shimmer 2.5s linear 1s infinite;
  border-radius:999px;
}
.alive-badge-icon{
  font-size:clamp(1.2rem,2.8vw,1.6rem);
  line-height:1;
}

.pts-label{
  position:absolute;bottom:12px;left:14px;z-index:5;
  background:rgba(0,0,0,0.48);color:white;
  padding:5px 14px;border-radius:999px;
  font-size:clamp(.7rem,1.5vw,.84rem);font-weight:700;letter-spacing:.3px;
  backdrop-filter:blur(6px);
}
.lvs{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:10px;flex-shrink:0}
.lb{display:flex;flex-direction:column;align-items:center;padding:7px 10px 6px;border-radius:10px;background:#e8e8e6;border:2px solid #ccc;min-width:82px;flex:1;max-width:130px;transition:all .5s;position:relative;overflow:hidden}
.lb.on{border-color:transparent;box-shadow:0 3px 14px rgba(0,0,0,.14)}
.lb.cur{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,.2)}
.lbf{position:absolute;inset:0;background:var(--c);transform:translateY(100%);transition:transform .9s cubic-bezier(.34,1.2,.64,1);z-index:0}
.lb.on .lbf{transform:translateY(0)}
.li{font-size:1.2rem;position:relative;z-index:1;margin-bottom:2px}
.ln{font-size:clamp(.6rem,1.4vw,.78rem);font-weight:700;position:relative;z-index:1;color:#1a1a1a;transition:color .4s}
.lp{font-size:clamp(.54rem,1.1vw,.64rem);font-weight:700;letter-spacing:.4px;position:relative;z-index:1;color:#888;transition:color .4s;margin-top:1px}
.lb.on .ln,.lb.on .lp{color:rgba(255,255,255,.92)}
.refresh-btn{display:flex;align-items:center;gap:6px;margin:8px auto 0;padding:6px 16px;background:transparent;border:1px solid #ccc;border-radius:999px;font-family:inherit;font-size:.72rem;color:#999;cursor:pointer;transition:all .2s;flex-shrink:0}
.refresh-btn:hover{border-color:#639922;color:#639922;background:rgba(99,153,34,.06)}
.refresh-btn.spinning .icon{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.icon{font-size:.8rem;line-height:1}
.status{margin-top:6px;text-align:center;font-size:.72rem;color:#888;min-height:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Our Virtual Tree</h1>
    <p>As employees log activities across regions, our tree grows more vibrant with every contribution.</p>
  </div>

  <div class="cv">
    <!-- Tree layers wrapped so breathe applies to both together -->
    <div class="tree-alive-wrap" id="tree-alive-wrap">
      <img class="tree-layer tree-bw" src="./tree-layer-1.jpg" alt="Tree background in black and white">
      <img class="tree-layer tree-colour" id="tree-colour" src="./tree-layer-2.jpg" alt="Tree background in color">
    </div>

    <!-- Creatures — visible only when team hits 1000 pts -->
    <div class="creature-layer" id="creature-layer">

      <div class="animal butterfly">
        <img src="./butterfly.gif" alt="butterflies">
      </div>

      <div class="animal butterfly2">
        <img src="./butterfly.gif" alt="butterflies">
      </div>

      <div class="animal deer1">
        <img src="./deer1.gif" alt="standing deer">
      </div>
      <div class="animal deer2">
        <img src="./deer2.gif" alt="sitting deer">
      </div>

      <div class="animal squirrel">
        <img src="./squirrel.gif" alt="squirrel eating a nut">
      </div>

      <div class="animal fox">
        <img src="./fox.gif" alt="running fox">
      </div>

    </div>

    <div class="alive-badge" id="alive-badge">
      <div class="alive-badge-inner">
        <span class="alive-badge-icon">🌿</span>
        The Tree is Alive!
        <span class="alive-badge-icon">🌿</span>
      </div>
    </div>

    <div class="pts-label" id="pts-label">0 / 500 pts</div>
  </div>

  <div class="lvs">
    <div class="lb" id="lb0" style="--c:#8BAE5A">
      <div class="lbf"></div><div class="li">🌱</div><div class="ln">Seedling</div><div class="lp">0+</div>
    </div>
    <div class="lb" id="lb1" style="--c:#74A84A">
      <div class="lbf"></div><div class="li">🌿</div><div class="ln">Sprout</div><div class="lp">125+</div>
    </div>
    <div class="lb" id="lb2" style="--c:#5F9E3E">
      <div class="lbf"></div><div class="li">🌳</div><div class="ln">Grower</div><div class="lp">250+</div>
    </div>
    <div class="lb" id="lb3" style="--c:#4F8B33">
      <div class="lbf"></div><div class="li">🌲</div><div class="ln">Guardian</div><div class="lp">375+</div>
    </div>
    <div class="lb" id="lb4" style="--c:#3E7429">
      <div class="lbf"></div><div class="li">🏆</div><div class="ln">Champion</div><div class="lp">500</div>
    </div>
  </div>

  <button class="refresh-btn" id="refresh-btn" onclick="refreshTree()">
    <span class="icon">⟳</span> Refresh
  </button>
  <div class="status" id="status"></div>
</div>

<script>
var JSONBIN_ID      = '69cff25faaba882197c08a39';
var JSONBIN_KEY     = '$2a$10$jg2aDiUfA7ZzIVCSZvwvJO8xwghElUb4w7Dx/9F2oYjQXj8xMn5SK';
var TEAM_GOAL       = 500;
var ALIVE_THRESHOLD = 1000;
var LOCAL_KEY       = 'ed_team_v3_events';
var POLL_INTERVAL   = 24 * 60 * 60 * 1000;
var pollTimer       = null;
var localEvents     = [];

function setStatus(msg){ var el=document.getElementById('status'); if(el) el.textContent=msg||''; }
function slug(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' ').replace(/[^\w ]+/g,'').replace(/\s/g,'-'); }

function normalizeEvent(ev){
  if(!ev||!ev.id||!ev.userKey) return null;
  var out={id:String(ev.id),type:ev.type==='reset'?'reset':'activity',userKey:String(ev.userKey),ts:Number(ev.ts||0)};
  if(out.type==='activity'){
    out.activityKey=String(ev.activityKey||'');
    out.pts=Number(ev.pts||0);
    if(!out.activityKey) return null;
  }
  return out;
}

function legacyMembersToEvents(raw){
  var out=[],seen={};
  var members=(raw&&raw.members)?raw.members:{};
  Object.keys(members).forEach(function(k){
    var m=members[k]||{};
    var userKey=slug(m.name||k||'member');
    var name=String(m.name||k||userKey);
    var updatedAt=Number(m.updatedAt||Date.now());
    var importedPts=0;
    if(Array.isArray(m.log)&&m.log.length){
      for(var i=0;i<m.log.length;i++){
        var lg=m.log[i]||{};
        var text=String(lg.text||'Imported activity');
        var catId=String(lg.catId||'legacy');
        var pts=Number(lg.pts||0);
        var ts=Number(lg.ts||(updatedAt+i));
        var activityKey=String(lg.activityKey||(catId+'|'+text));
        var id=String(lg.id||('legacy_'+userKey+'_'+ts+'_'+slug(activityKey).slice(0,40)));
        if(!seen[id]){seen[id]=true;out.push({id:id,type:'activity',userKey:userKey,name:name,activityKey:activityKey,text:text,catId:catId,pts:pts,ts:ts});importedPts+=pts;}
      }
    }
    var memberPts=Number(m.pts||0);
    if(memberPts>importedPts){
      var carryId='legacycarry_'+userKey;
      if(!seen[carryId]){seen[carryId]=true;out.push({id:carryId,type:'activity',userKey:userKey,name:name,activityKey:'legacy|carryover',text:'Imported prior points',catId:'legacy',pts:memberPts-importedPts,ts:updatedAt+999});}
    }
  });
  return out;
}

function mergeEventLists(baseEvents,incomingEvents){
  var map={},merged=[];
  function add(arr){(arr||[]).forEach(function(ev){var n=normalizeEvent(ev);if(n&&!map[n.id]){map[n.id]=true;merged.push(n);}});}
  add(baseEvents);add(incomingEvents);
  merged.sort(function(a,b){var at=Number(a.ts||0),bt=Number(b.ts||0);if(at!==bt)return at-bt;return String(a.id).localeCompare(String(b.id));});
  return merged;
}

function deriveTotal(events){
  var members={};
  var list=(events||[]).slice().sort(function(a,b){var at=Number(a.ts||0),bt=Number(b.ts||0);if(at!==bt)return at-bt;return String(a.id).localeCompare(String(b.id));});
  for(var i=0;i<list.length;i++){
    var ev=normalizeEvent(list[i]);if(!ev)continue;
    if(!members[ev.userKey])members[ev.userKey]={pts:0,done:{},lastResetAt:0};
    var m=members[ev.userKey];
    if(ev.type==='reset'){m.pts=0;m.done={};m.lastResetAt=ev.ts;continue;}
    if(m.lastResetAt&&ev.ts<m.lastResetAt)continue;
    if(!m.done[ev.activityKey]){m.done[ev.activityKey]=true;m.pts+=ev.pts;}
  }
  var total=0;Object.keys(members).forEach(function(k){total+=members[k].pts;});return total;
}

function parseRemoteEvents(text){
  try{
    var r=JSON.parse(text);var data=(r&&r.record!==undefined)?r.record:r;
    if(!data)return[];
    if(Array.isArray(data.events)&&data.events.length)return data.events;
    return legacyMembersToEvents(data);
  }catch(e){}return[];
}

function readLocalEvents(){
  try{var raw=localStorage.getItem(LOCAL_KEY);if(!raw)return[];var parsed=JSON.parse(raw);return Array.isArray(parsed.events)?parsed.events:[];}catch(e){}return[];
}

function updateLevels(total){
  var levels=[{min:0,el:'lb0'},{min:125,el:'lb1'},{min:250,el:'lb2'},{min:375,el:'lb3'},{min:500,el:'lb4'}];
  var current=0;
  for(var i=0;i<levels.length;i++){
    var el=document.getElementById(levels[i].el);if(!el)continue;
    el.classList.remove('on','cur');
    if(total>=levels[i].min){el.classList.add('on');current=i;}
  }
  var curEl=document.getElementById(levels[current].el);if(curEl)curEl.classList.add('cur');
}

function updateTree(total){
  var pct=Math.max(0,Math.min(100,(total/TEAM_GOAL)*100));
  var topInset=(100-pct).toFixed(2);
  var colourLayer=document.getElementById('tree-colour');
  if(colourLayer)colourLayer.style.clipPath='inset('+topInset+'% 0 0 0)';
  var pts=document.getElementById('pts-label');
  if(pts)pts.textContent=total+' / '+TEAM_GOAL+' pts';
  updateLevels(total);

  var creatures  = document.getElementById('creature-layer');
  var badge      = document.getElementById('alive-badge');
  var treeWrap   = document.getElementById('tree-alive-wrap');

  if(total >= ALIVE_THRESHOLD){
    if(creatures) creatures.classList.add('alive');
    if(badge)     badge.classList.add('show');
    if(treeWrap)  treeWrap.classList.add('alive');
  } else {
    if(creatures) creatures.classList.remove('alive');
    if(badge)     badge.classList.remove('show');
    if(treeWrap)  treeWrap.classList.remove('alive');
  }
}

function applyLocalFirst(){localEvents=readLocalEvents();if(localEvents.length)updateTree(deriveTotal(localEvents));}

function refreshTree(silent){
  var btn=document.getElementById('refresh-btn');
  if(!silent&&btn)btn.classList.add('spinning');
  if(!silent)setStatus('Refreshing...');
  var x=new XMLHttpRequest();
  x.open('GET','https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',true);
  x.setRequestHeader('X-Master-Key',JSONBIN_KEY);
  x.setRequestHeader('X-Bin-Meta','false');
  x.timeout=10000;
  x.onload=function(){
    if(btn)btn.classList.remove('spinning');
    if(x.status===200){
      var remoteEvents=parseRemoteEvents(x.responseText);
      localEvents=mergeEventLists(localEvents,remoteEvents);
      try{localStorage.setItem(LOCAL_KEY,JSON.stringify({events:localEvents}));}catch(e){}
      updateTree(deriveTotal(localEvents));
      if(!silent){setStatus('Updated.');setTimeout(function(){setStatus('');},1500);}
    }else{if(!silent)setStatus('Could not refresh right now.');}
  };
  x.onerror=x.ontimeout=function(){if(btn)btn.classList.remove('spinning');if(!silent)setStatus('Could not refresh right now.');};
  x.send();
}

function startPolling(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(function(){refreshTree(true);},POLL_INTERVAL);}

window.addEventListener('storage',function(e){
  if(e.key==='ed_pts_tick'||e.key===LOCAL_KEY){
    var fresh=readLocalEvents();localEvents=mergeEventLists(localEvents,fresh);updateTree(deriveTotal(localEvents));
  }
});

applyLocalFirst();
refreshTree(false);
startPolling();
</script>
</body>
</html>
