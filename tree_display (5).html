<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Earth Day Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#eef1ea;font-family:'Lato',sans-serif}
.wrap{display:flex;flex-direction:column;width:100%;height:100%;padding:14px 14px 12px}
.hdr{text-align:center;margin-bottom:10px;flex-shrink:0}
.hdr h1{font-family:'Playfair Display',serif;font-size:clamp(1rem,3vw,1.7rem);font-weight:700;color:#1a1a1a;letter-spacing:-.2px}
.hdr p{font-size:.72rem;color:#7a7a7a;margin-top:2px}
.cv{position:relative;flex:1;min-height:0;border-radius:12px;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,.15);background:linear-gradient(to bottom,#dfeee1 0%,#f7f4ea 72%,#d6e3c9 72%,#c7d8b7 100%)}
.cv canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.lvs{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:10px;flex-shrink:0}
.lb{display:flex;flex-direction:column;align-items:center;padding:7px 10px 6px;border-radius:10px;background:#e8e8e6;border:2px solid #ccc;min-width:82px;flex:1;max-width:130px;transition:all .5s;position:relative;overflow:hidden}
.lb.on{border-color:transparent;box-shadow:0 3px 14px rgba(0,0,0,.14)}
.lb.cur{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,.2)}
.lbf{position:absolute;inset:0;background:var(--c);transform:translateY(100%);transition:transform .9s cubic-bezier(.34,1.2,.64,1);z-index:0}
.lb.on .lbf{transform:translateY(0)}
.li{font-size:1.2rem;position:relative;z-index:1;margin-bottom:2px}
.ln{font-family:'Playfair Display',serif;font-size:clamp(.6rem,1.4vw,.78rem);font-weight:700;position:relative;z-index:1;color:#1a1a1a;transition:color .4s}
.lp{font-size:clamp(.54rem,1.1vw,.64rem);font-weight:700;letter-spacing:.4px;position:relative;z-index:1;color:#888;transition:color .4s;margin-top:1px}
.lck{position:absolute;top:4px;right:6px;font-size:.62rem;z-index:2}
.lb.on .ln,.lb.on .lp{color:rgba(255,255,255,.92)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Earth Day Participation</h1>
    <p>Color rises as your team earns impact points</p>
  </div>
  <div class="cv">
    <canvas id="C0"></canvas>
    <canvas id="C1"></canvas>
  </div>
  <div class="lvs" id="LV"></div>
</div>

<script>
var SP_GOAL = 500;
var LVS = [
  {n:'Seedling', e:'&#127807;', p:0,   c:'#66bb6a'},
  {n:'Sprout',   e:'&#127807;', p:125, c:'#26a69a'},
  {n:'Grower',   e:'&#127795;', p:250, c:'#42a5f5'},
  {n:'Guardian', e:'&#128737;', p:375, c:'#ab47bc'},
  {n:'Champion', e:'&#127942;', p:500, c:'#ffa726'}
];

function glv(p){
  var l=LVS[0];
  for(var i=0;i<LVS.length;i++){
    if(p>=LVS[i].p) l=LVS[i];
  }
  return l;
}

var pts=0,aT=0,tT=0;
var C0=document.getElementById('C0'),C1=document.getElementById('C1');
var X0=C0.getContext('2d'),X1=C1.getContext('2d');
var W=0,H=0,D=1;

function rsz(){
  var box=document.querySelector('.cv').getBoundingClientRect();
  D=Math.max(1,window.devicePixelRatio||1);
  W=Math.max(1,Math.round(box.width));
  H=Math.max(1,Math.round(box.height));
  [C0,C1].forEach(function(c){
    c.width=Math.round(W*D);
    c.height=Math.round(H*D);
    c.style.width=W+'px';
    c.style.height=H+'px';
  });
  X0.setTransform(D,0,0,D,0,0);
  X1.setTransform(D,0,0,D,0,0);
}

function drawScene(ctx,isBW){
  if(!W||!H) return;
  ctx.clearRect(0,0,W,H);

  var sky=ctx.createLinearGradient(0,0,0,H);
  if(isBW){
    sky.addColorStop(0,'#d8d8d8');
    sky.addColorStop(.7,'#f2f2f2');
    sky.addColorStop(.7,'#d4d4d4');
    sky.addColorStop(1,'#c2c2c2');
  }else{
    sky.addColorStop(0,'#dff2e2');
    sky.addColorStop(.68,'#f7f4ea');
    sky.addColorStop(.68,'#d8e6c8');
    sky.addColorStop(1,'#bfd4aa');
  }
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,H);

  var groundY=H*.74;

  ctx.fillStyle=isBW ? '#c7c7c7' : '#c7d8b7';
  ctx.fillRect(0,groundY,W,H-groundY);

  ctx.fillStyle=isBW ? '#b8b8b8' : '#b7cda0';
  ctx.beginPath();
  ctx.moveTo(0,groundY+8);
  ctx.bezierCurveTo(W*.2,groundY-8,W*.45,groundY+20,W*.7,groundY+6);
  ctx.bezierCurveTo(W*.86,-2+groundY,W*.94,groundY+10,W,groundY+4);
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fill();

  var trunkW=Math.max(24,W*.055);
  var trunkH=H*.36;
  var trunkX=W*.5-trunkW/2;
  var trunkY=groundY-trunkH+18;

  var trunkGrad=ctx.createLinearGradient(trunkX,0,trunkX+trunkW,0);
  if(isBW){
    trunkGrad.addColorStop(0,'#686868');
    trunkGrad.addColorStop(.5,'#7b7b7b');
    trunkGrad.addColorStop(1,'#5d5d5d');
  }else{
    trunkGrad.addColorStop(0,'#5e3b22');
    trunkGrad.addColorStop(.5,'#785030');
    trunkGrad.addColorStop(1,'#4b2f1b');
  }
  ctx.fillStyle=trunkGrad;
  roundRect(ctx,trunkX,trunkY,trunkW,trunkH,10,true,false);

  for(var i=0;i<6;i++){
    var bx=trunkX+trunkW/2+(i-2.5)*trunkW*.22;
    var by=trunkY+40+i*22;
    ctx.strokeStyle=isBW?'rgba(40,40,40,.20)':'rgba(40,20,8,.18)';
    ctx.lineWidth=1.2;
    ctx.beginPath();
    ctx.moveTo(bx,by);
    ctx.lineTo(bx+((i%2)?7:-7),by+15);
    ctx.stroke();
  }

  drawBranch(ctx,trunkX+trunkW*.52,trunkY+42,-W*.12,-H*.10,isBW);
  drawBranch(ctx,trunkX+trunkW*.52,trunkY+84, W*.14,-H*.12,isBW);
  drawBranch(ctx,trunkX+trunkW*.50,trunkY+120,-W*.18,-H*.06,isBW);
  drawBranch(ctx,trunkX+trunkW*.50,trunkY+136, W*.19,-H*.05,isBW);
  drawBranch(ctx,trunkX+trunkW*.50,trunkY+18,-W*.08,-H*.12,isBW);
  drawBranch(ctx,trunkX+trunkW*.50,trunkY+22, W*.09,-H*.13,isBW);

  var blobs=[
    {x:.50,y:.24,r:.18},
    {x:.36,y:.32,r:.14},
    {x:.64,y:.32,r:.14},
    {x:.28,y:.44,r:.12},
    {x:.72,y:.44,r:.12},
    {x:.42,y:.46,r:.13},
    {x:.58,y:.46,r:.13}
  ];

  blobs.forEach(function(b,idx){
    var x=W*b.x,y=H*b.y,r=Math.min(W,H)*b.r;
    var g=ctx.createRadialGradient(x-r*.25,y-r*.3,r*.15,x,y,r);
    if(isBW){
      g.addColorStop(0,['#9a9a9a','#8b8b8b','#949494','#8a8a8a','#838383','#8f8f8f','#7f7f7f'][idx]);
      g.addColorStop(1,['#6f6f6f','#666','#6c6c6c','#626262','#595959','#606060','#555'][idx]);
    }else{
      g.addColorStop(0,['#92cf77','#7bb85f','#8dcf74','#7ec163','#73b654','#7fbe65','#69ad4a'][idx]);
      g.addColorStop(1,['#4e8f37','#41792d','#4f8d36','#447e2f','#3e722a','#467d31','#3a6b28'][idx]);
    }
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fill();
  });

  if(!isBW){
    for(var p=0;p<90;p++){
      var px=Math.random()*W;
      var py=groundY + Math.random()*(H-groundY-6);
      var stem=isBW?'#7b7b7b':'#5f8b3a';
      var petal=['#f6d95d','#e89cc1','#9fd6ff','#ffffff','#c4a0ff'][p%5];
      ctx.strokeStyle=stem;
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(px,py);
      ctx.lineTo(px,py-6-Math.random()*6);
      ctx.stroke();
      ctx.fillStyle=petal;
      ctx.beginPath();
      ctx.arc(px,py-7-Math.random()*4,2.2,0,Math.PI*2);
      ctx.fill();
    }
  }
}

function roundRect(ctx,x,y,w,h,r,fill,stroke){
  if(w<2*r)r=w/2;
  if(h<2*r)r=h/2;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  if(fill)ctx.fill();
  if(stroke)ctx.stroke();
}

function drawBranch(ctx,x,y,dx,dy,isBW){
  ctx.strokeStyle=isBW?'#666':'#5d3a21';
  ctx.lineWidth=Math.max(4,Math.abs(dx)*.04);
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.quadraticCurveTo(x+dx*.35,y+dy*.15,x+dx,y+dy);
  ctx.stroke();

  ctx.lineWidth=Math.max(2,Math.abs(dx)*.02);
  ctx.beginPath();
  ctx.moveTo(x+dx*.6,y+dy*.4);
  ctx.lineTo(x+dx*.84,y+dy*.62);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x+dx*.55,y+dy*.35);
  ctx.lineTo(x+dx*.74,y+dy*.1);
  ctx.stroke();
}

function doBW(){ drawScene(X0,true); }
function doCol(){ drawScene(X1,false); }

/* liquid fill — reveals the colour version from bottom up */
function mask(t){
  if(!W||!H) return;
  X1.clearRect(0,0,W,H);
  doCol();
  var fy=(H+10)+((-10)-(H+10))*t, E=24;
  X1.save();
  X1.globalCompositeOperation='destination-out';
  if(fy-E>0){
    X1.fillStyle='rgba(0,0,0,1)';
    X1.fillRect(0,0,W,fy-E);
  }
  var fd=X1.createLinearGradient(0,fy-E,0,fy+E);
  fd.addColorStop(0,'rgba(0,0,0,1)');
  fd.addColorStop(1,'rgba(0,0,0,0)');
  X1.beginPath();
  X1.moveTo(0,0);
  X1.lineTo(0,fy);
  for(var x=0;x<=W;x+=2){
    X1.lineTo(x,fy+Math.sin((x/W)*Math.PI*4+Date.now()/900)*6);
  }
  X1.lineTo(W,0);
  X1.closePath();
  X1.fillStyle=fd;
  X1.fill();
  X1.restore();
}

(function loop(){
  var d=tT-aT;
  aT+=Math.abs(d)>.0008?d*.045:d;
  mask(aT);
  requestAnimationFrame(loop);
})();

function badges(){
  var lv=glv(pts),row=document.getElementById('LV');
  row.innerHTML='';
  LVS.forEach(function(l){
    var on=pts>=l.p,cur=lv.n===l.n,el=document.createElement('div');
    el.className='lb'+(on?' on':'')+(cur?' cur':'');
    el.style.setProperty('--c',l.c);
    el.innerHTML='<div class="lbf"></div><span class="li">'+l.e+'</span><span class="ln">'+l.n+'</span><span class="lp">'+l.p+' pts</span>'+(cur?'<span class="lck">&#11088;</span>':on?'<span class="lck">&#10004;</span>':'');
    row.appendChild(el);
  });
}

/* JSONBIN SYNC */
var JSONBIN_ID  = '69cff25faaba882197c08a39';
var JSONBIN_KEY = '$2a$10$jg2aDiUfA7ZzIVCSZvwvJO8xwghElUb4w7Dx/9F2oYjQXj8xMn5SK';
var LOCAL_KEY   = 'ed_team_v1';

function applyPts(total){
  var capped=Math.min(total,SP_GOAL);
  if(capped!==pts){
    pts=capped;
    tT=pts/SP_GOAL;
    badges();
  }
}

function sumMembers(obj){
  var total=0;
  if(!obj||!obj.members) return 0;
  var keys=Object.keys(obj.members);
  for(var i=0;i<keys.length;i++){
    total+=obj.members[keys[i]].pts||0;
  }
  return total;
}

function syncRemote(){
  if(!JSONBIN_ID||!JSONBIN_KEY){
    syncLocal();
    return;
  }
  var xhr=new XMLHttpRequest();
  xhr.open('GET','https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',true);
  xhr.setRequestHeader('X-Master-Key',JSONBIN_KEY);
  xhr.setRequestHeader('X-Bin-Meta','false');
  xhr.timeout=5000;
  xhr.onload=function(){
    if(xhr.status===200){
      try{
        var parsed=JSON.parse(xhr.responseText);
        var d=null;
        if(parsed&&parsed.members) d=parsed;
        else if(parsed&&parsed.record&&parsed.record.members) d=parsed.record;
        if(d&&Object.keys(d.members).length>0){
          applyPts(sumMembers(d));
          return;
        }
      }catch(ex){}
    }
    syncLocal();
  };
  xhr.ontimeout=function(){syncLocal();};
  xhr.onerror=function(){syncLocal();};
  xhr.send();
}

function syncLocal(){
  try{
    var s=localStorage.getItem(LOCAL_KEY);
    if(!s) return;
    applyPts(sumMembers(JSON.parse(s)));
  }catch(e){}
}

window.addEventListener('resize',function(){
  rsz();
  doBW();
});

if(typeof ResizeObserver!=='undefined'){
  new ResizeObserver(function(){
    rsz();
    doBW();
  }).observe(document.querySelector('.cv'));
}

var lastUpdatedSeen='';

function init(){
  rsz();
  if(!W||!H){
    setTimeout(init,100);
    return;
  }
  doBW();
  badges();
  syncRemote();
  setInterval(syncRemote,3000);
  setInterval(function(){
    try{
      var lu=localStorage.getItem('ed_team_updated')||'';
      if(lu!==lastUpdatedSeen){
        lastUpdatedSeen=lu;
        syncLocal();
      }
    }catch(e){}
  },800);
}

if(document.fonts&&document.fonts.ready){
  document.fonts.ready.then(function(){setTimeout(init,30);});
}else{
  window.addEventListener('load',function(){setTimeout(init,30);});
}
</script>
</body>
</html>
