<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Our Virtual Tree</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:Aptos,"Segoe UI",sans-serif}
.wrap{display:flex;flex-direction:column;width:100%;height:100%;padding:14px 14px 12px}
.hdr{text-align:center;margin-bottom:10px;flex-shrink:0}
.hdr h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:700;color:#1a1a1a}
.hdr p{font-size:clamp(.9rem,1.5vw,1.2rem);color:#7a7a7a;margin-top:6px}
.cv{position:relative;flex:1;min-height:0;border-radius:12px;overflow:hidden;background:#f4f4f2}
.tree-layer{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.tree-bw{filter:grayscale(1) brightness(0.88) contrast(1.05);z-index:1}
.tree-colour{z-index:2;opacity:0;transition:opacity 1.4s ease}
.pts-label{
  position:absolute;bottom:12px;left:14px;z-index:5;
  background:rgba(0,0,0,0.48);color:white;
  padding:5px 14px;border-radius:999px;
  font-size:clamp(.7rem,1.5vw,.84rem);font-weight:700;letter-spacing:.3px;
  backdrop-filter:blur(6px);
}
.lvs{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:10px;flex-shrink:0}
.lb{display:flex;flex-direction:column;align-items:center;padding:7px 10px 6px;border-radius:10px;background:#e8e8e6;border:2px solid #ccc;min-width:82px;flex:1;max-width:130px;transition:all .5s;position:relative;overflow:hidden}
.lb.on{border-color:transparent;box-shadow:0 3px 14px rgba(0,0,0,.14)}
.lb.cur{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,.2)}
.lbf{position:absolute;inset:0;background:var(--c);transform:translateY(100%);transition:transform .9s cubic-bezier(.34,1.2,.64,1);z-index:0}
.lb.on .lbf{transform:translateY(0)}
.li{font-size:1.2rem;position:relative;z-index:1;margin-bottom:2px}
.ln{font-size:clamp(.6rem,1.4vw,.78rem);font-weight:700;position:relative;z-index:1;color:#1a1a1a;transition:color .4s}
.lp{font-size:clamp(.54rem,1.1vw,.64rem);font-weight:700;letter-spacing:.4px;position:relative;z-index:1;color:#888;transition:color .4s;margin-top:1px}
.lck{position:absolute;top:4px;right:6px;font-size:.62rem;z-index:2}
.lb.on .ln,.lb.on .lp{color:rgba(255,255,255,.92)}
.refresh-btn{display:flex;align-items:center;gap:6px;margin:8px auto 0;padding:6px 16px;background:transparent;border:1px solid #ccc;border-radius:999px;font-family:inherit;font-size:.72rem;color:#999;cursor:pointer;transition:all .2s;flex-shrink:0}
.refresh-btn:hover{border-color:#639922;color:#639922;background:rgba(99,153,34,.06)}
.refresh-btn.spinning .icon{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.icon{font-size:.8rem;line-height:1}
.status{margin-top:6px;text-align:center;font-size:.72rem;color:#888;min-height:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Our Virtual Tree</h1>
    <p>As employees log activities across regions, our tree grows more vibrant with every contribution.</p>
  </div>

  <div class="cv">
    <img class="tree-layer tree-bw" src="./tree-layer-1.jpg" alt="Tree background in black and white">
    <img class="tree-layer tree-colour" id="tree-colour" src="./tree-layer-2.jpg" alt="Tree background in color">
    <div class="pts-label" id="pts-label">0 / 500 pts</div>
  </div>

  <div class="lvs">
    <div class="lb" id="lb0" style="--c:#8BAE5A">
      <div class="lbf"></div><div class="li">🌱</div><div class="ln">Seedling</div><div class="lp">0+</div>
    </div>
    <div class="lb" id="lb1" style="--c:#74A84A">
      <div class="lbf"></div><div class="li">🌿</div><div class="ln">Sprout</div><div class="lp">125+</div>
    </div>
    <div class="lb" id="lb2" style="--c:#5F9E3E">
      <div class="lbf"></div><div class="li">🌳</div><div class="ln">Grower</div><div class="lp">250+</div>
    </div>
    <div class="lb" id="lb3" style="--c:#4F8B33">
      <div class="lbf"></div><div class="li">🌲</div><div class="ln">Guardian</div><div class="lp">375+</div>
    </div>
    <div class="lb" id="lb4" style="--c:#3E7429">
      <div class="lbf"></div><div class="li">🏆</div><div class="ln">Champion</div><div class="lp">500</div>
    </div>
  </div>

  <button class="refresh-btn" id="refresh-btn" onclick="refreshTree()">
    <span class="icon">⟳</span> Refresh
  </button>
  <div class="status" id="status"></div>
</div>

<script>
var JSONBIN_ID='69cff25faaba882197c08a39';
var JSONBIN_KEY='$2a$10$jg2aDiUfA7ZzIVCSZvwvJO8xwghElUb4w7Dx/9F2oYjQXj8xMn5SK';
var TEAM_GOAL=500;
var LOCAL_KEY='ed_team_v3_events';
var POLL_INTERVAL=24*60*60*1000;
var pollTimer=null;

function setStatus(msg){
  var el=document.getElementById('status');
  if(el) el.textContent=msg||'';
}

function slug(s){
  return String(s||'').trim().toLowerCase().replace(/\s+/g,' ').replace(/[^\w ]+/g,'').replace(/\s/g,'-');
}

function legacyMembersToEvents(raw){
  var out=[], seen={};
  var members=raw&&raw.members?raw.members:{};
  Object.keys(members).forEach(function(k){
    var m=members[k]||{};
    var userKey=slug(m.name||k||'member');
    var name=String(m.name||k||userKey);
    var updatedAt=Number(m.updatedAt||Date.now());
    var importedPts=0;
    if(Array.isArray(m.log)&&m.log.length){
      for(var i=0;i<m.log.length;i++){
        var lg=m.log[i]||{};
        var text=String(lg.text||'Imported activity');
        var catId=String(lg.catId||'legacy');
        var pts=Number(lg.pts||0);
        var ts=Number(lg.ts||(updatedAt+i));
        var activityKey=String(lg.activityKey||(catId+'|'+text));
        var id=String(lg.id||('legacy_'+userKey+'_'+ts+'_'+slug(activityKey).slice(0,40)));
        if(!seen[id]){seen[id]=true;out.push({id:id,type:'activity',userKey:userKey,name:name,activityKey:activityKey,text:text,catId:catId,pts:pts,ts:ts});importedPts+=pts;}
      }
    }
    var memberPts=Number(m.pts||0);
    if(memberPts>importedPts){
      var carryId='legacycarry_'+userKey;
      if(!seen[carryId]){seen[carryId]=true;out.push({id:carryId,type:'activity',userKey:userKey,name:name,activityKey:'legacy|carryover',text:'Imported prior points',catId:'legacy',pts:memberPts-importedPts,ts:updatedAt+999});}
    }
  });
  return out;
}

function normalizeEvent(ev){
  if(!ev||!ev.id||!ev.userKey) return null;
  var out={
    id:String(ev.id),
    type:ev.type==='reset'?'reset':'activity',
    userKey:String(ev.userKey),
    ts:Number(ev.ts||0)
  };
  if(out.type==='activity'){
    out.activityKey=String(ev.activityKey||'');
    out.pts=Number(ev.pts||0);
    if(!out.activityKey) return null;
  }
  return out;
}

function deriveTotal(events){
  var members={};
  var list=(events||[]).slice().sort(function(a,b){
    var at=Number(a.ts||0),bt=Number(b.ts||0);
    if(at!==bt) return at-bt;
    return String(a.id).localeCompare(String(b.id));
  });
  for(var i=0;i<list.length;i++){
    var ev=normalizeEvent(list[i]);
    if(!ev) continue;
    if(!members[ev.userKey]) members[ev.userKey]={pts:0,done:{},lastResetAt:0};
    var m=members[ev.userKey];
    if(ev.type==='reset'){
      m.pts=0; m.done={}; m.lastResetAt=ev.ts;
      continue;
    }
    if(m.lastResetAt && ev.ts<m.lastResetAt) continue;
    if(!m.done[ev.activityKey]){
      m.done[ev.activityKey]=true;
      m.pts+=ev.pts;
    }
  }
  var total=0;
  Object.keys(members).forEach(function(k){ total+=members[k].pts; });
  return total;
}

function parseRemoteResponse(text){
  try{
    var r=JSON.parse(text);
    var data=(r&&r.record!==undefined)?r.record:r;
    if(!data) return {};
    if(!Array.isArray(data.events)||!data.events.length){
      var legacyEvents=legacyMembersToEvents(data);
      return {events:legacyEvents};
    }
    return data;
  }catch(e){}
  return {};
}

function readLocal(){
  try{
    var raw=localStorage.getItem(LOCAL_KEY);
    if(!raw) return null;
    return JSON.parse(raw)||null;
  }catch(e){}
  return null;
}

function getTotalPoints(data){
  if(data&&Array.isArray(data.events)&&data.events.length){
    return deriveTotal(data.events);
  }
  var members=(data&&data.members)?data.members:{};
  var total=0;
  Object.keys(members).forEach(function(k){
    total+=Number((members[k]&&members[k].pts)||0);
  });
  return total;
}

function updateLevels(total){
  var levels=[
    {min:0,el:'lb0'},
    {min:125,el:'lb1'},
    {min:250,el:'lb2'},
    {min:375,el:'lb3'},
    {min:500,el:'lb4'}
  ];
  var current=0;
  for(var i=0;i<levels.length;i++){
    var el=document.getElementById(levels[i].el);
    if(!el) continue;
    el.classList.remove('on','cur');
    if(total>=levels[i].min){
      el.classList.add('on');
      current=i;
    }
  }
  var curEl=document.getElementById(levels[current].el);
  if(curEl) curEl.classList.add('cur');
}

function updateTree(total){
  // Opacity scales 0→1 as points go 0→TEAM_GOAL
  var opacity=Math.max(0,Math.min(1,total/TEAM_GOAL));
  var colourLayer=document.getElementById('tree-colour');
  if(colourLayer) colourLayer.style.opacity=opacity;

  var pts=document.getElementById('pts-label');
  if(pts) pts.textContent=total+' / '+TEAM_GOAL+' pts';
  updateLevels(total);
}

function applyLocalFirst(){
  var local=readLocal();
  if(local){
    var total=getTotalPoints(local);
    updateTree(total);
  }
}

function refreshTree(silent){
  var btn=document.getElementById('refresh-btn');
  if(!silent && btn) btn.classList.add('spinning');
  if(!silent) setStatus('Refreshing...');

  var x=new XMLHttpRequest();
  x.open('GET','https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',true);
  x.setRequestHeader('X-Master-Key',JSONBIN_KEY);
  x.setRequestHeader('X-Bin-Meta','false');
  x.timeout=10000;

  x.onload=function(){
    if(btn) btn.classList.remove('spinning');
    if(x.status===200){
      var data=parseRemoteResponse(x.responseText);
      var total=getTotalPoints(data);
      updateTree(total);
      if(!silent){
        setStatus('Updated.');
        setTimeout(function(){ setStatus(''); },1500);
      }
    }else{
      if(!silent) setStatus('Could not refresh right now.');
    }
  };

  x.onerror=x.ontimeout=function(){
    if(btn) btn.classList.remove('spinning');
    if(!silent) setStatus('Could not refresh right now.');
  };

  x.send();
}

function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer=setInterval(function(){
    refreshTree(true);
  }, POLL_INTERVAL);
}

window.addEventListener('storage',function(e){
  if(e.key==='ed_pts_tick'||e.key===LOCAL_KEY){
    applyLocalFirst();
  }
});

applyLocalFirst();
refreshTree(false);
startPolling();
</script>
</body>
</html>
