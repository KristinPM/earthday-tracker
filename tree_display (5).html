<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Day Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f0ee;font-family:"Lato",sans-serif}
.wrap{display:flex;flex-direction:column;width:100%;height:100%;padding:14px 14px 12px}
.hdr{text-align:center;margin-bottom:10px;flex-shrink:0}
.hdr h1{font-family:"Playfair Display",serif;font-size:clamp(1rem,3vw,1.7rem);font-weight:700;color:#1a1a1a;letter-spacing:-.2px}
.hdr p{font-size:.72rem;color:#888;margin-top:2px}
.cv{position:relative;flex:1;min-height:0;border-radius:12px;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,.13)}
.cv canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.lvs{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:10px;flex-shrink:0}
.lb{display:flex;flex-direction:column;align-items:center;padding:7px 10px 6px;border-radius:10px;background:#e8e8e6;border:2px solid #ccc;min-width:82px;flex:1;max-width:130px;transition:all .5s;position:relative;overflow:hidden}
.lb.on{border-color:transparent;box-shadow:0 3px 14px rgba(0,0,0,.14)}
.lb.cur{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,.2)}
.lbf{position:absolute;inset:0;background:var(--c);transform:translateY(100%);transition:transform .9s cubic-bezier(.34,1.2,.64,1);z-index:0}
.lb.on .lbf{transform:translateY(0)}
.li{font-size:1.2rem;position:relative;z-index:1;margin-bottom:2px}
.ln{font-family:"Playfair Display",serif;font-size:clamp(.6rem,1.4vw,.78rem);font-weight:700;position:relative;z-index:1;color:#1a1a1a;transition:color .4s}
.lp{font-size:clamp(.54rem,1.1vw,.64rem);font-weight:700;letter-spacing:.4px;position:relative;z-index:1;color:#888;transition:color .4s;margin-top:1px}
.lck{position:absolute;top:4px;right:6px;font-size:.62rem;z-index:2}
.lb.on .ln,.lb.on .lp{color:rgba(255,255,255,.92)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Earth Day Participation</h1>
    <p>Color rises as your team earns impact points</p>
  </div>
  <div class="cv">
    <canvas id="C0"></canvas>
    <canvas id="C1"></canvas>
  </div>
  <div class="lvs" id="LV"></div>
</div>
<script>
/* ── CONFIGURE FOR CROSS-DEVICE SYNC ──
   Must match the values in employee_activity_log.html */
var JSONBIN_ID  = '69cfe99336566621a877ae8f';
var JSONBIN_KEY = '$2a$10$jg2aDiUfA7ZzIVCSZvwvJO8xwghElUb4w7Dx/9F2oYjQXj8xMn5SK';
/* ─────────────────────────────────────────────────── */
var LOCAL_KEY = 'ed_team_v1';
var SP_GOAL   = 100;
var POLL_MS   = 12000;

var LVS=[
  {n:"Seedling",e:"&#127807;",p:0,  c:"#66bb6a"},
  {n:"Sprout",  e:"&#127807;",p:10, c:"#26a69a"},
  {n:"Grower",  e:"&#127795;",p:25, c:"#42a5f5"},
  {n:"Guardian",e:"&#128737;",p:50, c:"#ab47bc"},
  {n:"Champion",e:"&#127942;",p:100,c:"#ffa726"}
];
function glv(p){var l=LVS[0];for(var i=0;i<LVS.length;i++){if(p>=LVS[i].p)l=LVS[i];}return l;}

var pts=0, aT=0, tT=0;
var C0=document.getElementById("C0"), C1=document.getElementById("C1");
var X0=C0.getContext("2d"), X1=C1.getContext("2d");
var W=0, H=0, D=1;

function rsz(){var r=C0.parentElement.getBoundingClientRect();D=Math.min(window.devicePixelRatio||1,2);W=r.width;H=r.height;C0.width=W*D;C0.height=H*D;C1.width=W*D;C1.height=H*D;X0.setTransform(D,0,0,D,0,0);X1.setTransform(D,0,0,D,0,0);}

function applyTotal(total){var capped=Math.min(total,SP_GOAL);if(capped!==pts){pts=capped;tT=pts/SP_GOAL;renderBadges();}}

/* ── JSONbin poll — cross-device sync ── */
function pollRemote(){
  if(!JSONBIN_ID||!JSONBIN_KEY){ pollLocal(); return; }
  var xhr=new XMLHttpRequest();
  xhr.open('GET','https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',true);
  xhr.setRequestHeader('X-Master-Key',JSONBIN_KEY);
  xhr.setRequestHeader('X-Bin-Meta','false');
  xhr.timeout=8000;
  xhr.onload=function(){
    try{
      var parsed=JSON.parse(xhr.responseText);
      var d=(parsed&&parsed.members)?parsed:(parsed&&parsed.record?parsed.record:null);
      if(d&&d.members){
        var total=0,keys=Object.keys(d.members);
        for(var i=0;i<keys.length;i++) total+=d.members[keys[i]].pts||0;
        applyTotal(total);
      }
    }catch(e){ pollLocal(); }
  };
  xhr.ontimeout=function(){ pollLocal(); };
  xhr.onerror=function(){ pollLocal(); };
  xhr.send();
}

/* ── localStorage poll — same-device fallback ── */
function pollLocal(){
  try{
    var s=localStorage.getItem('ed_team_v1');
    if(!s) return;
    var d=JSON.parse(s);
    if(d&&d.members){
      var total=0,keys=Object.keys(d.members);
      for(var i=0;i<keys.length;i++) total+=d.members[keys[i]].pts||0;
      applyTotal(total);
    }
  }catch(e){}
}

function pollCloud(){ pollRemote(); }

function rng(seed){var x=(seed^0xdeadbeef)>>>0;return function(){x=Math.imul(x^x>>>15,x|1);x^=x+Math.imul(x^x>>>7,x|61);return((x^x>>>14)>>>0)/4294967296;};}

function scene(ctx,bw){
  if(!W||!H)return;
  ctx.clearRect(0,0,W,H);
  var sg=ctx.createLinearGradient(0,0,0,H*.65);sg.addColorStop(0,bw?"#bfbfbf":"#b3d9f5");sg.addColorStop(1,bw?"#dfdfdf":"#d9f0d0");ctx.fillStyle=sg;ctx.fillRect(0,0,W,H*.65);
  if(!bw){var sg2=ctx.createRadialGradient(W*.82,H*.1,0,W*.82,H*.1,42);sg2.addColorStop(0,"rgba(255,248,180,1)");sg2.addColorStop(.5,"rgba(255,220,60,.5)");sg2.addColorStop(1,"rgba(255,200,0,0)");ctx.fillStyle=sg2;ctx.beginPath();ctx.arc(W*.82,H*.1,42,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=bw?"#c5c5c5":"#fff066";ctx.beginPath();ctx.arc(W*.82,H*.1,16,0,Math.PI*2);ctx.fill();
  var clouds=[[W*.12,H*.11,.88],[W*.44,H*.07,.7],[W*.67,H*.13,.58]];var blobs=[[-18,2,19],[0,-8,24],[18,2,19],[-30,8,14],[30,8,13]];
  for(var ci=0;ci<clouds.length;ci++)for(var bi=0;bi<blobs.length;bi++){ctx.beginPath();ctx.arc(clouds[ci][0]+blobs[bi][0]*clouds[ci][2],clouds[ci][1]+blobs[bi][1]*clouds[ci][2],blobs[bi][2]*clouds[ci][2],0,Math.PI*2);ctx.fillStyle=bw?"rgba(255,255,255,.68)":"rgba(255,255,255,.86)";ctx.fill();}
  var hills=bw?[["#b5b5b5",.60],["#c8c8c8",.65]]:[["#5a9e38",.60],["#78b84e",.65]];
  for(var hi=0;hi<hills.length;hi++){ctx.fillStyle=hills[hi][0];ctx.beginPath();ctx.moveTo(0,H*hills[hi][1]);for(var hx=0;hx<=W;hx+=16){var hy=H*hills[hi][1]-Math.sin(hx/W*Math.PI)*H*.1-Math.sin(hx/W*Math.PI*3)*H*.04;if(hx===0)ctx.moveTo(hx,hy);else ctx.lineTo(hx,hy);}ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();}
  var gY=H*.72;var gg=ctx.createLinearGradient(0,gY,0,H);gg.addColorStop(0,bw?"#989898":"#6ab040");gg.addColorStop(.2,bw?"#7e7e7e":"#559030");gg.addColorStop(1,bw?"#5e5e5e":"#3a6820");ctx.fillStyle=gg;ctx.beginPath();ctx.moveTo(0,gY);ctx.bezierCurveTo(W*.3,gY-9,W*.7,gY-9,W,gY);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  ctx.fillStyle=bw?"rgba(255,255,255,.07)":"rgba(255,255,255,.11)";ctx.beginPath();ctx.moveTo(0,gY);ctx.bezierCurveTo(W*.3,gY-9,W*.7,gY-9,W,gY);ctx.lineTo(W,gY+13);ctx.bezierCurveTo(W*.7,gY+4,W*.3,gY+4,0,gY+13);ctx.closePath();ctx.fill();
  var gr=rng(42);for(var i=0;i<55;i++){var gx=gr()*W,gy2=gY+3+gr()*H*.22,gh=6+gr()*13,lean=(gr()-.5)*.7,v=68+gr()*38|0;ctx.strokeStyle=bw?"rgb("+v+","+v+","+v+")":"rgb("+(40+gr()*40|0)+","+(100+gr()*54|0)+","+(25+gr()*24|0)+")";ctx.lineWidth=.7+gr()*1.3;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(gx,gy2);ctx.quadraticCurveTo(gx+lean*gh*.6,gy2-gh*.44,gx+lean*gh,gy2-gh);ctx.stroke();}
  var fr=rng(33);var fcB=[["#ddd","#aaa"],["#ccc","#999"],["#e8e8e8","#bbb"],["#d5d5d5","#a0a0a0"],["#ebebeb","#c5c5c5"]];var fcC=[["#f7b8ce","#e91e8c"],["#fde1c8","#ff8f00"],["#fff9c4","#fbc02d"],["#e1bee7","#9c27b0"],["#b2ebf2","#00838f"]];var fc=bw?fcB:fcC;
  for(var i=0;i<22;i++){var fx=fr()*W,fy=gY+6+fr()*H*.22,sh=9+fr()*13,pr=2+fr()*2.4,fl=fc[i%fc.length];ctx.save();ctx.globalAlpha=.65+fr()*.34;var sv=95+fr()*58|0;ctx.strokeStyle=bw?"rgb("+sv+","+sv+","+sv+")":"#3a8c2a";ctx.lineWidth=1.1;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(fx,fy);ctx.quadraticCurveTo(fx+(fr()-.5)*7,fy-sh*.5,fx,fy-sh);ctx.stroke();for(var fp=0;fp<5;fp++){var pa=(fp/5)*Math.PI*2,pv=160+fp*14|0;var r2=bw?pv:parseInt(fl[0].slice(1,3),16),g2=bw?pv:parseInt(fl[0].slice(3,5),16),b2=bw?pv:parseInt(fl[0].slice(5,7),16);ctx.fillStyle="rgb("+r2+","+g2+","+b2+")";ctx.beginPath();ctx.ellipse(fx+Math.cos(pa)*pr*1.6,fy-sh+Math.sin(pa)*pr*1.6,pr*1.1,pr*.64,pa,0,Math.PI*2);ctx.fill();}ctx.fillStyle=bw?"#e8e8e8":fl[1];ctx.beginPath();ctx.arc(fx,fy-sh,pr*.64,0,Math.PI*2);ctx.fill();ctx.restore();}
  var tx=W*.58,tb=gY+3;
  function br(x1,y1,a,l,w,d){if(l<2||d>11)return;var rr=rng(d*31+l|0),x2=x1+Math.cos(a)*l,y2=y1+Math.sin(a)*l,dv=Math.max(0,1-w/14),bv=35+dv*54|0;ctx.strokeStyle=bw?"rgb("+bv+","+bv+","+bv+")":"rgb("+(48+dv*44|0)+","+(28+dv*21|0)+","+(8+dv*7|0)+")";ctx.lineWidth=Math.max(w,.5);ctx.lineCap="round";ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();if(l<10){var lr=rng(d*17+l*3|0);for(var k=0;k<3+Math.floor(lr()*5);k++){var lx=x2+(lr()-.5)*21,ly=y2+(lr()-.5)*17,ls=5+lr()*9,la=lr()*Math.PI*2;ctx.save();ctx.translate(lx,ly);ctx.rotate(la);var lv2=65+lr()*68|0,lc=bw?[lv2,lv2,lv2]:(k%3===0?[40,130,35]:(k%3===1?[65,158,55]:[100,188,74]));ctx.fillStyle="rgb("+lc[0]+","+lc[1]+","+lc[2]+")";ctx.globalAlpha=.65+lr()*.34;ctx.beginPath();ctx.ellipse(0,0,ls,ls*.42,0,0,Math.PI*2);ctx.fill();ctx.restore();}if(!bw){var br2=rng(d*19+l*7|0);for(var bb=0;bb<Math.floor(br2()*3);bb++){var bx2=x2+(br2()-.5)*24,by2=y2+(br2()-.5)*19;ctx.save();ctx.fillStyle=["#f9a8d4","#fce7f3","#fbcfe8"][bb%3];ctx.globalAlpha=.7+br2()*.28;ctx.beginPath();ctx.arc(bx2,by2,2.4+br2()*2.4,0,Math.PI*2);ctx.fill();ctx.restore();}}return;}var sh2=.66+rr()*.07;br(x2,y2,a-(.32+rr()*.23),l*sh2,w*.62,d+1);br(x2,y2,a+(.28+rr()*.19),l*sh2,w*.57,d+1);if(rr()>.3)br(x2,y2,a+(rr()-.5)*.12,l*(sh2*.88),w*.44,d+1);}
  br(tx,tb,-Math.PI/2+.05,H*.33,16,0);
  var rd=rng(99);var roots=[[tx,tb,tx-88,tb+15,10],[tx,tb,tx+73,tb+13,9],[tx,tb,tx-49,tb+21,6],[tx,tb,tx+103,tb+11,5]];
  for(var ri=0;ri<roots.length;ri++){var ro=roots[ri],cpx=(ro[0]+ro[2])/2+(rd()-.5)*17,cpy=(ro[1]+ro[3])/2+rd()*12+7;ctx.strokeStyle=bw?"rgb(45,45,45)":"rgb(45,25,8)";ctx.lineWidth=ro[4];ctx.lineCap="round";ctx.beginPath();ctx.moveTo(ro[0],ro[1]);ctx.quadraticCurveTo(cpx,cpy,ro[2],ro[3]);ctx.stroke();}
  if(!bw){var bfx=W*.22,bfy=H*.46;ctx.save();ctx.globalAlpha=.84;ctx.fillStyle="#f48fb1";ctx.beginPath();ctx.ellipse(bfx-12,bfy-4,14,9,-.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(bfx+12,bfy-4,14,9,.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(bfx-7,bfy+7,9,6,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(bfx+7,bfy+7,9,6,.3,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#ad1457";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(bfx,bfy-11);ctx.lineTo(bfx,bfy+14);ctx.stroke();ctx.restore();}
  var birds=[[W*.14,H*.16,9],[W*.23,H*.11,7],[W*.74,H*.1,8]];
  for(var bdi=0;bdi<birds.length;bdi++){var bd=birds[bdi],bvv=bw?65:25;ctx.strokeStyle=bw?"rgb("+bvv+","+bvv+","+bvv+")":"rgba(25,35,100,.74)";ctx.lineWidth=1.3;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(bd[0]-bd[2],bd[1]);ctx.quadraticCurveTo(bd[0]-bd[2]*.25,bd[1]-bd[2]*.54,bd[0],bd[1]);ctx.quadraticCurveTo(bd[0]+bd[2]*.25,bd[1]-bd[2]*.54,bd[0]+bd[2],bd[1]);ctx.stroke();}
  var lv=glv(pts);ctx.font="700 "+Math.max(10,H*.026)+"px Lato,sans-serif";ctx.fillStyle=bw?"rgba(40,40,40,.36)":"rgba(20,60,20,.4)";ctx.textAlign="left";ctx.fillText(lv.n+"  "+pts+" / "+SP_GOAL+" pts",11,H-11);
}

function doBW(){scene(X0,true);}
function doCol(){scene(X1,false);}

function mask(t){
  if(!W||!H)return;
  X1.clearRect(0,0,W,H);doCol();
  var fy=(H+10)+((-10)-(H+10))*t,E=22;
  X1.save();X1.globalCompositeOperation="destination-out";
  if(fy-E>0){X1.fillStyle="rgba(0,0,0,1)";X1.fillRect(0,0,W,fy-E);}
  var fd=X1.createLinearGradient(0,fy-E,0,fy+E);fd.addColorStop(0,"rgba(0,0,0,1)");fd.addColorStop(1,"rgba(0,0,0,0)");
  X1.beginPath();X1.moveTo(0,0);X1.lineTo(0,fy);
  for(var x=0;x<=W;x+=2)X1.lineTo(x,fy+Math.sin((x/W)*Math.PI*4+Date.now()/900)*5);
  X1.lineTo(W,0);X1.closePath();X1.fillStyle=fd;X1.fill();X1.restore();
}

(function loop(){var d=tT-aT;aT+=Math.abs(d)>.0008?d*.045:d;mask(aT);doBW();requestAnimationFrame(loop);})();

function renderBadges(){
  var lv=glv(pts),row=document.getElementById("LV");row.innerHTML="";
  for(var i=0;i<LVS.length;i++){var l=LVS[i],on=pts>=l.p,cur=lv.n===l.n,div=document.createElement("div");div.className="lb"+(on?" on":"")+(cur?" cur":"");div.style.setProperty("--c",l.c);div.innerHTML="<div class=\"lbf\"></div><span class=\"li\">"+l.e+"</span><span class=\"ln\">"+l.n+"</span><span class=\"lp\">"+l.p+" pts</span>"+(cur?"<span class=\"lck\">&#11088;</span>":(on?"<span class=\"lck\">&#10004;</span>":""));row.appendChild(div);}
}

window.addEventListener("resize",function(){rsz();doBW();});
if(typeof ResizeObserver!=="undefined"){new ResizeObserver(function(){rsz();doBW();}).observe(document.querySelector(".cv"));}

function init(){
  rsz();
  if(!W||!H){setTimeout(init,100);return;}
  doBW();renderBadges();
  pollCloud();
  setInterval(pollCloud, POLL_MS);
}

if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){setTimeout(init,50);});}
else{window.addEventListener("load",function(){setTimeout(init,50);});}
</script>
</body>
</html>
