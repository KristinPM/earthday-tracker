<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Earth Day Oak Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#eef1ea;font-family:'Lato',sans-serif}
.wrap{display:flex;flex-direction:column;width:100%;height:100%;padding:14px 14px 12px}
.hdr{text-align:center;margin-bottom:10px;flex-shrink:0}
.hdr h1{font-family:'Playfair Display',serif;font-size:clamp(1rem,3vw,1.7rem);font-weight:700;color:#1a1a1a;letter-spacing:-.2px}
.hdr p{font-size:.72rem;color:#7a7a7a;margin-top:2px}
.cv{position:relative;flex:1;min-height:0;border-radius:12px;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,.13)}
.cv canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.lvs{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:10px;flex-shrink:0}
.lb{display:flex;flex-direction:column;align-items:center;padding:7px 10px 6px;border-radius:10px;background:#e8e8e6;border:2px solid #ccc;min-width:82px;flex:1;max-width:130px;transition:all .5s;position:relative;overflow:hidden}
.lb.on{border-color:transparent;box-shadow:0 3px 14px rgba(0,0,0,.14)}
.lb.cur{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,.2)}
.lbf{position:absolute;inset:0;background:var(--c);transform:translateY(100%);transition:transform .9s cubic-bezier(.34,1.2,.64,1);z-index:0}
.lb.on .lbf{transform:translateY(0)}
.li{font-size:1.2rem;position:relative;z-index:1;margin-bottom:2px}
.ln{font-family:'Playfair Display',serif;font-size:clamp(.6rem,1.4vw,.78rem);font-weight:700;position:relative;z-index:1;color:#1a1a1a;transition:color .4s}
.lp{font-size:clamp(.54rem,1.1vw,.64rem);font-weight:700;letter-spacing:.4px;position:relative;z-index:1;color:#888;transition:color .4s;margin-top:1px}
.lck{position:absolute;top:4px;right:6px;font-size:.62rem;z-index:2}
.lb.on .ln,.lb.on .lp{color:rgba(255,255,255,.92)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Earth Day Participation</h1>
    <p>Color rises as your team earns impact points</p>
  </div>
  <div class="cv">
    <canvas id="C0"></canvas>
    <canvas id="C1"></canvas>
  </div>
  <div class="lvs" id="LV"></div>
</div>

<script>
/* ─────────────────────────────────────────
   SHAREPOINT / SYNC CONFIG
───────────────────────────────────────── */
var SP_SITE   = 'https://YOUR-ORG.sharepoint.com/sites/YOUR-SITE';
var SP_LIST   = 'EarthDayParticipation';
var SP_PTSCOL = 'Points';
var SP_GOAL   = 100;
var SYNC_SEC  = 60;

/* ─────────────────────────────────────────
   LEVELS
───────────────────────────────────────── */
var LVS=[
  {n:'Seedling',e:'🌱',p:0,  c:'#66bb6a'},
  {n:'Sprout',  e:'🌿',p:10, c:'#26a69a'},
  {n:'Grower',  e:'🌳',p:25, c:'#42a5f5'},
  {n:'Guardian',e:'🛡️',p:50, c:'#ab47bc'},
  {n:'Champion',e:'🏆',p:100,c:'#ffa726'}
];
function glv(p){var l=LVS[0];for(var i=0;i<LVS.length;i++){if(p>=LVS[i].p)l=LVS[i];}return l;}

var pts=0,aT=0,tT=0;
var C0=document.getElementById('C0'),C1=document.getElementById('C1');
var X0=C0.getContext('2d'),X1=C1.getContext('2d');
var W=0,H=0,D=1;

function rsz(){
  var r=C0.parentElement.getBoundingClientRect();
  D=Math.min(window.devicePixelRatio||1,2);
  W=r.width;H=r.height;
  [C0,C1].forEach(function(c){c.width=W*D;c.height=H*D;});
  X0.setTransform(D,0,0,D,0,0);
  X1.setTransform(D,0,0,D,0,0);
}

function rng(seed){
  var x=(seed^0xdeadbeef)>>>0;
  return function(){x=Math.imul(x^x>>>15,x|1);x^=x+Math.imul(x^x>>>7,x|61);return((x^x>>>14)>>>0)/4294967296;};
}

/* ─────────────────────────────────────────
   DRAW SCENE
───────────────────────────────────────── */
function scene(ctx,bw){
  if(!W||!H)return;
  ctx.clearRect(0,0,W,H);

  var gY=H*.68;
  var tCX=W*.50, tBase=gY+H*.005;

  /* SKY */
  var sky=ctx.createLinearGradient(0,0,0,gY);
  sky.addColorStop(0,   bw?'#888':'#7aa7cf');
  sky.addColorStop(.55, bw?'#b5b5b5':'#a9c7dd');
  sky.addColorStop(.88, bw?'#d2d2d2':'#d7e6ef');
  sky.addColorStop(1,   bw?'#e2e2e2':'#edf3df');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,gY);

  if(!bw){
    var glow=ctx.createRadialGradient(W*.82,H*.07,0,W*.82,H*.07,W*.28);
    glow.addColorStop(0,'rgba(255,243,180,.35)');
    glow.addColorStop(.45,'rgba(255,220,120,.10)');
    glow.addColorStop(1,'rgba(255,200,120,0)');
    ctx.fillStyle=glow;
    ctx.fillRect(0,0,W,gY);
  }

  /* CLOUDS */
  function cloud(cx,cy,s,a){
    var p=[[-50,7,28],[-26,-9,35],[0,-17,40],[26,-9,35],[50,7,28],[-36,18,20],[-14,10,24],[14,10,24],[36,18,20],[0,24,16]];
    for(var i=0;i<p.length;i++){
      ctx.beginPath();
      ctx.arc(cx+p[i][0]*s,cy+p[i][1]*s,p[i][2]*s,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+a+')';
      ctx.fill();
    }
  }
  cloud(W*.68,H*.065,.92,.78);
  cloud(W*.16,H*.07,.76,.68);
  cloud(W*.42,H*.04,.60,.58);
  cloud(W*.87,H*.17,.48,.52);

  /* DISTANT RIDGES */
  var rC=bw?[['#989898',.56],['#aaaaaa',.60],['#bcbcbc',.64]]
           :[['#6f8b5d',.56],['#7d9770',.60],['#91a986',.64]];
  for(var ri=0;ri<3;ri++){
    ctx.fillStyle=rC[ri][0];
    ctx.beginPath();
    ctx.moveTo(0,H*rC[ri][1]);
    for(var rx=0;rx<=W;rx+=6){
      var ry=H*rC[ri][1]
        -Math.sin(rx/W*Math.PI*2.5+ri*.7)*H*.055
        -Math.sin(rx/W*Math.PI*5.2+ri*1.2)*H*.02
        -Math.sin(rx/W*Math.PI*.85+ri*.5)*H*.035;
      rx===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
    }
    ctx.lineTo(W,H);
    ctx.lineTo(0,H);
    ctx.closePath();
    ctx.fill();
  }

  if(!bw){
    for(var ht=0;ht<5;ht++){
      var htx=W*(.70+ht*.054),hty=H*.638,hth=H*.036+ht%2*H*.011;
      ctx.fillStyle='#5d7450';
      ctx.beginPath(); ctx.arc(htx,hty-hth*.45,hth*.27,0,Math.PI*2); ctx.fill();
      ctx.fillRect(htx-hth*.04,hty-hth*.5,hth*.08,hth*.52);
    }
  }

  /* FIELD / MOUND */
  var gg=ctx.createLinearGradient(0,gY-H*.12,0,H);
  gg.addColorStop(0,  bw?'#888':'#7da85d');
  gg.addColorStop(.1, bw?'#787878':'#709851');
  gg.addColorStop(.4, bw?'#646464':'#5f8443');
  gg.addColorStop(1,  bw?'#505050':'#4c6d35');
  ctx.fillStyle=gg;
  ctx.beginPath();
  ctx.moveTo(0,gY+H*.06);
  ctx.bezierCurveTo(W*.07,gY,     W*.28,gY-H*.09, W*.41,gY-H*.115);
  ctx.bezierCurveTo(W*.46,gY-H*.125,W*.51,gY-H*.13,W*.55,gY-H*.118);
  ctx.bezierCurveTo(W*.68,gY-H*.085,W*.85,gY+H*.005,W,gY+H*.06);
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle=bw?'rgba(255,255,255,.09)':'rgba(210,240,180,.18)';
  ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(0,gY+H*.06);
  ctx.bezierCurveTo(W*.07,gY,     W*.28,gY-H*.09, W*.41,gY-H*.115);
  ctx.bezierCurveTo(W*.46,gY-H*.125,W*.51,gY-H*.13,W*.55,gY-H*.118);
  ctx.bezierCurveTo(W*.68,gY-H*.085,W*.85,gY+H*.005,W,gY+H*.06);
  ctx.stroke();

  /* GRASS BLADES */
  var gr=rng(42);
  for(var gi=0;gi<180;gi++){
    var gx2=gr()*W;
    var hillH=gY-H*.13*Math.exp(-Math.pow((gx2/W-.48)*2.9,2));
    var gy3=hillH+gr()*H*.28;
    if(gy3>H*.97) continue;
    var gh2=6+gr()*15, lv=58+gr()*44|0, lean=(gr()-.5)*.85;
    ctx.strokeStyle=bw
      ?'rgb('+lv+','+lv+','+lv+')'
      :'rgb('+(55+gr()*35|0)+','+(95+gr()*55|0)+','+(30+gr()*20|0)+')';
    ctx.lineWidth=.65+gr()*1.25;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(gx2,gy3);
    ctx.quadraticCurveTo(gx2+lean*gh2*.5,gy3-gh2*.5,gx2+lean*gh2,gy3-gh2);
    ctx.stroke();
  }

  /* WILDFLOWERS */
  var fr=rng(33);
  var flC=bw?null:[
    ['#ffffff','#d6b84f'],
    ['#f6f1d3','#d9b95b'],
    ['#c96bc0','#7b3f7b'],
    ['#7db6ff','#3f6fa8'],
    ['#f4c95d','#c4901f'],
    ['#ff8a80','#c95b52']
  ];
  for(var fi=0;fi<180;fi++){
    var fx=fr()*W;
    var fhH=gY-H*.13*Math.exp(-Math.pow((fx/W-.48)*2.9,2));
    var fy=fhH+10+fr()*H*.26;
    if(fy>H*.97) continue;

    var fh=6+fr()*10, fpr=1.6+fr()*1.8;
    var fco=flC?flC[fi%flC.length]:null;

    ctx.save();
    ctx.globalAlpha=.72+fr()*.22;
    ctx.strokeStyle=bw?'rgb(70,70,70)':'#4f7d35';
    ctx.lineWidth=.9;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(fx,fy);
    ctx.quadraticCurveTo(fx+(fr()-.5)*4,fy-fh*.5,fx,fy-fh);
    ctx.stroke();

    var np=fi%3===0?6:5;
    for(var fp=0;fp<np;fp++){
      var pa=(fp/np)*Math.PI*2, pv=148+fp*13|0;
      ctx.fillStyle=bw?'rgb('+pv+','+pv+','+pv+')':fco[0];
      ctx.beginPath();
      ctx.ellipse(
        fx+Math.cos(pa)*fpr*1.45,
        fy-fh+Math.sin(pa)*fpr*1.45,
        fpr*.95,
        fpr*.48,
        pa,0,Math.PI*2
      );
      ctx.fill();
    }
    ctx.fillStyle=bw?'#e5e5e5':fco[1];
    ctx.beginPath();
    ctx.arc(fx,fy-fh,fpr*.52,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  /* ROOTS */
  var rootDefs=[
    [tCX-W*.22,tBase+H*.055,tCX-W*.11,tBase+H*.01,28,9],
    [tCX-W*.15,tBase+H*.075,tCX-W*.07,tBase+H*.03,22,7],
    [tCX-W*.06,tBase+H*.075,tCX-W*.02,tBase+H*.04,18,6],
    [tCX+W*.06,tBase+H*.075,tCX+W*.02,tBase+H*.04,18,6],
    [tCX+W*.16,tBase+H*.075,tCX+W*.08,tBase+H*.03,22,7],
    [tCX+W*.24,tBase+H*.055,tCX+W*.13,tBase+H*.01,28,9]
  ];
  for(var rri=0;rri<6;rri++){
    var rd=rootDefs[rri];
    ctx.strokeStyle=bw?'#444':'#5a3820';
    ctx.lineCap='round';
    for(var rw=rd[4];rw>=rd[5];rw-=1.5){
      var tt=(rd[4]-rw)/(rd[4]-rd[5]);
      var rx1=tCX*(1-tt)+rd[2]*tt, ry1=tBase*(1-tt)+rd[3]*tt;
      var rx2=rd[2]*(1-tt)+rd[0]*tt, ry2=rd[3]*(1-tt)+rd[1]*tt;
      ctx.lineWidth=rw;
      ctx.beginPath();
      ctx.moveTo(rx1,ry1);
      ctx.lineTo(rx2,ry2);
      ctx.stroke();
    }
  }

  /* TRUNK */
  function drawTrunk(x1,y1,x2,y2,w1,w2){
    var len=Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1));
    if(len<1) return;
    var nx=(-(y2-y1)/len), ny=((x2-x1)/len);
    var tg=ctx.createLinearGradient(x1-nx*w1,y1,x1+nx*w1,y1);
    if(bw){
      tg.addColorStop(0,'#2a2a2a');
      tg.addColorStop(.20,'#4a4a4a');
      tg.addColorStop(.48,'#767676');
      tg.addColorStop(.76,'#505050');
      tg.addColorStop(1,'#2a2a2a');
    } else {
      tg.addColorStop(0,'#241408');
      tg.addColorStop(.18,'#5d3a20');
      tg.addColorStop(.46,'#8b613d');
      tg.addColorStop(.72,'#6f4728');
      tg.addColorStop(1,'#241408');
    }

    ctx.beginPath();
    ctx.moveTo(x1-nx*w1,y1);
    ctx.quadraticCurveTo((x1+x2)/2-nx*w1*.86,(y1+y2)/2,x2-nx*w2,y2);
    ctx.lineTo(x2+nx*w2,y2);
    ctx.quadraticCurveTo((x1+x2)/2+nx*w1*.86,(y1+y2)/2,x1+nx*w1,y1);
    ctx.closePath();
    ctx.fillStyle=tg;
    ctx.fill();

    ctx.save();
    ctx.globalAlpha=.12;
    ctx.strokeStyle='#000';
    for(var bi=1;bi<8;bi++){
      var bt=bi/8;
      var bx1=x1-nx*w1+nx*w1*2*bt, bx2=x2-nx*w2+nx*w2*2*bt;
      ctx.lineWidth=.65;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(bx1,y1);
      ctx.quadraticCurveTo((bx1+bx2)/2+(bt-.5)*3,(y1+y2)/2,bx2,y2);
      ctx.stroke();
    }
    ctx.restore();

    /* extra bark texture */
    ctx.save();
    ctx.globalAlpha=.16;
    for(var bi2=0;bi2<55;bi2++){
      var tx=x1+(Math.random()-.5)*w1*1.4;
      var ty=y1+Math.random()*(y2-y1);
      var th=4+Math.random()*10;
      ctx.fillStyle='rgba(0,0,0,.35)';
      ctx.fillRect(tx,ty,1,th);
    }
    ctx.restore();
  }

  var forkY=tBase-H*.22;
  drawTrunk(tCX,tBase, tCX,forkY, H*.125,H*.072);

  drawTrunk(tCX,forkY, tCX-W*.24,forkY-H*.10, H*.072,H*.040);
  drawTrunk(tCX,forkY, tCX-W*.06,forkY-H*.17, H*.072,H*.046);
  drawTrunk(tCX,forkY, tCX+W*.12,forkY-H*.15, H*.072,H*.042);
  drawTrunk(tCX,forkY, tCX+W*.28,forkY-H*.08, H*.072,H*.036);

  drawTrunk(tCX-W*.18,forkY-H*.07, tCX-W*.36,forkY-H*.15, H*.028,H*.014);
  drawTrunk(tCX-W*.02,forkY-H*.12, tCX-W*.16,forkY-H*.24, H*.024,H*.012);
  drawTrunk(tCX+W*.10,forkY-H*.10, tCX+W*.26,forkY-H*.22, H*.024,H*.012);
  drawTrunk(tCX+W*.22,forkY-H*.05, tCX+W*.40,forkY-H*.12, H*.022,H*.010);

  /* LEAF CLUSTERS */
  function leafCluster(cx,cy,rw,rh,count,seed,baseAlpha){
    var lr=rng(seed);
    for(var i=0;i<count;i++){
      var lx=cx+(lr()-.5)*rw*1.7, ly=cy+(lr()-.5)*rh*1.5;
      var lrx=rw*(.40+lr()*.50), lry=rh*(.28+lr()*.40);
      var lv=46+lr()*70|0;

      ctx.save();
      ctx.globalAlpha=(baseAlpha||.70)+lr()*.22;
      if(bw){
        ctx.fillStyle='rgb('+lv+','+lv+','+lv+')';
      } else {
        var lPal=[
          [34,72,28],
          [42,84,34],
          [50,96,40],
          [58,108,46],
          [66,118,52],
          [40,78,30]
        ];
        var lc=lPal[i%lPal.length];
        ctx.fillStyle='rgb('+lc[0]+','+lc[1]+','+lc[2]+')';
      }

      ctx.beginPath();
      var points=7+Math.floor(lr()*4);
      for(var p=0;p<points;p++){
        var ang=(p/points)*Math.PI*2;
        var rr=lrx*(.62+lr()*.48);
        var px=lx+Math.cos(ang)*rr;
        var py=ly+Math.sin(ang)*(lry*(.62+lr()*.55));
        if(p===0) ctx.moveTo(px,py);
        else ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha=.06;
      ctx.fillStyle='#000';
      for(var n=0;n<7;n++){
        ctx.fillRect(
          lx + (lr()-.5)*lrx*1.1,
          ly + (lr()-.5)*lry*.95,
          1,
          1
        );
      }
      ctx.restore();
    }
  }

  var cCX=tCX-W*.02, cCY=forkY-H*.16;
  var cW=W*.42, cH=H*.26;

  /* oak canopy: broad, low, irregular */
  leafCluster(cCX-cW*.62, cCY-cH*.02, cW*.34,cH*.24, 16,13, .66);
  leafCluster(cCX-cW*.48, cCY-cH*.22, cW*.34,cH*.24, 18,19, .68);
  leafCluster(cCX-cW*.22, cCY-cH*.34, cW*.38,cH*.26, 22,23, .70);
  leafCluster(cCX+cW*.05, cCY-cH*.38, cW*.40,cH*.28, 24,31, .72);
  leafCluster(cCX+cW*.34, cCY-cH*.30, cW*.36,cH*.24, 20,37, .70);
  leafCluster(cCX+cW*.56, cCY-cH*.10, cW*.30,cH*.22, 16,41, .68);

  leafCluster(cCX-cW*.38, cCY-cH*.08, cW*.46,cH*.30, 28,61, .76);
  leafCluster(cCX-cW*.05, cCY-cH*.10, cW*.52,cH*.34, 34,67, .80);
  leafCluster(cCX+cW*.28, cCY-cH*.08, cW*.46,cH*.30, 28,71, .76);

  leafCluster(cCX-cW*.26, cCY+cH*.12, cW*.40,cH*.24, 18,73, .72);
  leafCluster(cCX+cW*.08, cCY+cH*.10, cW*.42,cH*.24, 18,79, .72);
  leafCluster(cCX+cW*.42, cCY+cH*.08, cW*.32,cH*.22, 14,83, .68);

  if(!bw){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=.10;
    ctx.fillStyle='#d7e9aa';
    ctx.beginPath();
    ctx.ellipse(cCX+cW*.18,cCY-cH*.24,cW*.28,cH*.18,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  /* BIRDS */
  var bds=[[W*.08,H*.11,8],[W*.14,H*.075,6.5],[W*.24,H*.10,7.5],[W*.72,H*.065,8],[W*.78,H*.11,6],[W*.91,H*.055,7],[W*.60,H*.045,5.5]];
  for(var bdi=0;bdi<7;bdi++){
    var bd=bds[bdi];
    ctx.strokeStyle=bw?'rgba(40,40,40,.70)':'rgba(60,70,90,.60)';
    ctx.lineWidth=1.5;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(bd[0]-bd[2],bd[1]);
    ctx.quadraticCurveTo(bd[0]-bd[2]*.26,bd[1]-bd[2]*.56,bd[0],bd[1]);
    ctx.quadraticCurveTo(bd[0]+bd[2]*.26,bd[1]-bd[2]*.56,bd[0]+bd[2],bd[1]);
    ctx.stroke();
  }

  /* subtle haze for realism */
  ctx.save();
  var haze=ctx.createLinearGradient(0,0,0,H);
  haze.addColorStop(0,'rgba(255,255,255,0.04)');
  haze.addColorStop(1,'rgba(255,255,255,0.14)');
  ctx.fillStyle=haze;
  ctx.fillRect(0,0,W,H);
  ctx.restore();

  /* LABEL */
  var lv3=glv(pts);
  ctx.font='700 '+Math.max(12,H*.028)+'px Lato,Georgia,sans-serif';
  ctx.fillStyle=bw?'rgba(20,20,20,.35)':'rgba(30,50,22,.38)';
  ctx.textAlign='left';
  ctx.fillText(lv3.n+'  '+pts+' / '+SP_GOAL+' pts',14,H-14);
}

function doBW(){scene(X0,true);}
function doCol(){scene(X1,false);}

/* LIQUID FILL */
function mask(t){
  if(!W||!H)return;
  X1.clearRect(0,0,W,H);
  doCol();
  var fy=(H+10)+((-10)-(H+10))*t,E=22;
  X1.save();
  X1.globalCompositeOperation='destination-out';
  if(fy-E>0){
    X1.fillStyle='rgba(0,0,0,1)';
    X1.fillRect(0,0,W,fy-E);
  }
  var fd=X1.createLinearGradient(0,fy-E,0,fy+E);
  fd.addColorStop(0,'rgba(0,0,0,1)');
  fd.addColorStop(1,'rgba(0,0,0,0)');
  X1.beginPath();
  X1.moveTo(0,0);
  X1.lineTo(0,fy);
  for(var x=0;x<=W;x+=2){
    X1.lineTo(x,fy+Math.sin((x/W)*Math.PI*4+Date.now()/900)*5);
  }
  X1.lineTo(W,0);
  X1.closePath();
  X1.fillStyle=fd;
  X1.fill();
  X1.restore();
}

(function loop(){
  var d=tT-aT;
  aT+=Math.abs(d)>.0008?d*.045:d;
  mask(aT);
  doBW();
  requestAnimationFrame(loop);
})();

function badges(){
  var lv=glv(pts),row=document.getElementById('LV');
  row.innerHTML='';
  LVS.forEach(function(l){
    var on=pts>=l.p,cur=lv.n===l.n,d=document.createElement('div');
    d.className='lb'+(on?' on':'')+(cur?' cur':'');
    d.style.setProperty('--c',l.c);
    d.innerHTML='<div class="lbf"></div><span class="li">'+l.e+'</span><span class="ln">'+l.n+'</span><span class="lp">'+l.p+' pts</span>'+(cur?'<span class="lck">⭐</span>':on?'<span class="lck">✔</span>':'');
    row.appendChild(d);
  });
}

/* JSONBIN */
var JSONBIN_ID  = '69cff25faaba882197c08a39';
var JSONBIN_KEY = '$2a$10$jg2aDiUfA7ZzIVCSZvwvJO8xwghElUb4w7Dx/9F2oYjQXj8xMn5SK';

var LOCAL_KEY = 'ed_team_v1';

function applyPts(total){
  var capped = Math.min(total, SP_GOAL);
  if(capped !== pts){
    pts = capped;
    tT = pts / SP_GOAL;
    badges();
  }
}

function sumMembers(obj){
  var total = 0;
  if(!obj || !obj.members) return 0;
  var keys = Object.keys(obj.members);
  for(var i = 0; i < keys.length; i++) total += obj.members[keys[i]].pts || 0;
  return total;
}

function syncRemote(){
  if(!JSONBIN_ID || !JSONBIN_KEY){ syncLocal(); return; }
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.jsonbin.io/v3/b/' + JSONBIN_ID + '/latest', true);
  xhr.setRequestHeader('X-Master-Key', JSONBIN_KEY);
  xhr.setRequestHeader('X-Bin-Meta', 'false');
  xhr.timeout = 5000;
  xhr.onload = function(){
    if(xhr.status === 200){
      try{
        var parsed = JSON.parse(xhr.responseText);
        var d = null;
        if(parsed && parsed.members) d = parsed;
        else if(parsed && parsed.record && parsed.record.members) d = parsed.record;
        if(d && Object.keys(d.members).length > 0){
          applyPts(sumMembers(d));
          return;
        }
      }catch(ex){}
    }
  };
  xhr.ontimeout = function(){ syncLocal(); };
  xhr.onerror   = function(){ syncLocal(); };
  xhr.send();
}

function syncLocal(){
  try{
    var s = localStorage.getItem(LOCAL_KEY);
    if(!s) return;
    applyPts(sumMembers(JSON.parse(s)));
  }catch(e){}
}

window.addEventListener('resize', function(){ rsz(); doBW(); });
if(typeof ResizeObserver !== 'undefined'){
  new ResizeObserver(function(){ rsz(); doBW(); }).observe(document.querySelector('.cv'));
}

var lastUpdatedSeen = '';

function init(){
  rsz();
  if(!W || !H){ setTimeout(init, 100); return; }
  doBW();
  badges();
  syncRemote();
  setInterval(syncRemote, 3000);
  setInterval(function(){
    try{
      var ts = localStorage.getItem('ed_team_updated') || '';
      if(ts && ts !== lastUpdatedSeen){
        lastUpdatedSeen = ts;
        syncRemote();
      }
    }catch(e){}
  }, 500);
}

if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(function(){ setTimeout(init, 50); });
} else {
  window.addEventListener('load', function(){ setTimeout(init, 50); });
}
